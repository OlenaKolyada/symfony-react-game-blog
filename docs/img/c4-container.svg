<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <style>
    text { font-family: Arial, sans-serif; fill: #1f2937; }
    .title { font-size: 26px; font-weight: 700; }
    .label { font-size: 18px; font-weight: 700; }
    .small { font-size: 13px; }
    .box { fill: #f8fafc; stroke: #334155; stroke-width: 2; rx: 8; }
    .person { fill: #dbeafe; stroke: #1d4ed8; stroke-width: 2; rx: 8; }
    .system { fill: #eef2ff; stroke: #4338ca; stroke-width: 2; rx: 10; }
    .db { fill: #ecfdf5; stroke: #047857; stroke-width: 2; rx: 8; }
    .line { stroke: #475569; stroke-width: 2; marker-end: url(#arrow); fill: none; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569"/>
    </marker>
  </defs>
  <text x="40" y="48" class="title">Grem C4 Container Diagram</text>
  <rect x="360" y="90" width="780" height="590" class="system"/>
  <text x="390" y="128" class="label">Grem System</text>
  <text x="390" y="152" class="small">Gaming portal with public content, authentication, and administration</text>

  <rect x="50" y="130" width="220" height="90" class="person"/>
  <text x="80" y="165" class="label">Visitor / User</text>
  <text x="80" y="190" class="small">Browses content and profile</text>

  <rect x="50" y="290" width="220" height="90" class="person"/>
  <text x="80" y="325" class="label">Administrator</text>
  <text x="80" y="350" class="small">Manages portal content</text>

  <rect x="410" y="190" width="260" height="120" class="box"/>
  <text x="445" y="225" class="label">Next.js Frontend</text>
  <text x="445" y="250" class="small">React, TypeScript, Tailwind</text>
  <text x="445" y="272" class="small">Public pages, login, profile</text>

  <rect x="800" y="190" width="260" height="120" class="box"/>
  <text x="835" y="225" class="label">Symfony Backend</text>
  <text x="835" y="250" class="small">PHP, Apache, Doctrine</text>
  <text x="835" y="272" class="small">JSON API, EasyAdmin, Swagger</text>

  <rect x="800" y="410" width="260" height="120" class="db"/>
  <text x="865" y="445" class="label">MySQL</text>
  <text x="835" y="470" class="small">Users, tokens, games, news,</text>
  <text x="835" y="492" class="small">reviews, comments, metadata</text>

  <rect x="410" y="410" width="260" height="120" class="box"/>
  <text x="465" y="445" class="label">phpMyAdmin</text>
  <text x="445" y="470" class="small">Local database administration</text>

  <path d="M270 175 L410 230" class="line"/>
  <text x="290" y="185" class="small">HTTP pages</text>
  <path d="M270 335 L800 230" class="line"/>
  <text x="430" y="330" class="small">Admin UI</text>
  <path d="M670 250 L800 250" class="line"/>
  <text x="690" y="238" class="small">HTTP/JSON + cookies</text>
  <path d="M930 310 L930 410" class="line"/>
  <text x="945" y="365" class="small">SQL</text>
  <path d="M670 470 L800 470" class="line"/>
  <text x="705" y="458" class="small">SQL</text>
</svg>

