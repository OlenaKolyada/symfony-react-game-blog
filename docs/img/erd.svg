<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="1000" viewBox="0 0 1500 1000">
  <style>
    text { font-family: Arial, sans-serif; fill: #1f2937; }
    .title { font-size: 26px; font-weight: 700; }
    .entity { fill: #f8fafc; stroke: #334155; stroke-width: 2; rx: 8; }
    .core { fill: #eef2ff; stroke: #4f46e5; stroke-width: 2; rx: 8; }
    .meta { fill: #ecfdf5; stroke: #047857; stroke-width: 2; rx: 8; }
    .auth { fill: #fef3c7; stroke: #b45309; stroke-width: 2; rx: 8; }
    .label { font-size: 16px; font-weight: 700; }
    .field { font-size: 12px; }
    .line { stroke: #475569; stroke-width: 2; fill: none; }
  </style>
  <text x="40" y="48" class="title">Grem Entity Relationship Diagram</text>

  <rect x="60" y="110" width="190" height="130" class="auth"/>
  <text x="85" y="140" class="label">user</text>
  <text x="85" y="165" class="field">id PK</text>
  <text x="85" y="185" class="field">email UK</text>
  <text x="85" y="205" class="field">roles, nickname, avatar</text>

  <rect x="60" y="310" width="190" height="110" class="auth"/>
  <text x="85" y="340" class="label">user_token</text>
  <text x="85" y="365" class="field">id PK</text>
  <text x="85" y="385" class="field">user_id FK</text>
  <text x="85" y="405" class="field">session_id, expires_at</text>

  <rect x="360" y="110" width="220" height="180" class="core"/>
  <text x="390" y="140" class="label">game</text>
  <text x="390" y="165" class="field">id PK</text>
  <text x="390" y="185" class="field">title, slug, status</text>
  <text x="390" y="205" class="field">content, summary</text>
  <text x="390" y="225" class="field">release dates, rating</text>
  <text x="390" y="245" class="field">cover, screenshots, trailer</text>

  <rect x="720" y="110" width="220" height="140" class="core"/>
  <text x="750" y="140" class="label">news</text>
  <text x="750" y="165" class="field">id PK</text>
  <text x="750" y="185" class="field">author_id FK</text>
  <text x="750" y="205" class="field">title, slug, status</text>
  <text x="750" y="225" class="field">content, summary, cover</text>

  <rect x="720" y="340" width="220" height="150" class="core"/>
  <text x="750" y="370" class="label">review</text>
  <text x="750" y="395" class="field">id PK</text>
  <text x="750" y="415" class="field">author_id FK</text>
  <text x="750" y="435" class="field">title, slug, status</text>
  <text x="750" y="455" class="field">game_rating, content</text>

  <rect x="1060" y="340" width="210" height="120" class="core"/>
  <text x="1090" y="370" class="label">comment</text>
  <text x="1090" y="395" class="field">id PK</text>
  <text x="1090" y="415" class="field">author_id FK</text>
  <text x="1090" y="435" class="field">review_id FK, status</text>

  <rect x="360" y="420" width="190" height="100" class="meta"/>
  <text x="390" y="450" class="label">developer</text>
  <text x="390" y="475" class="field">id PK, title, slug</text>
  <text x="390" y="495" class="field">country, website</text>

  <rect x="360" y="570" width="190" height="100" class="meta"/>
  <text x="390" y="600" class="label">publisher</text>
  <text x="390" y="625" class="field">id PK, title, slug</text>
  <text x="390" y="645" class="field">country, website</text>

  <rect x="660" y="570" width="170" height="95" class="meta"/>
  <text x="690" y="600" class="label">genre</text>
  <text x="690" y="625" class="field">id PK</text>
  <text x="690" y="645" class="field">title, slug</text>

  <rect x="910" y="570" width="170" height="95" class="meta"/>
  <text x="940" y="600" class="label">platform</text>
  <text x="940" y="625" class="field">id PK</text>
  <text x="940" y="645" class="field">title, slug</text>

  <rect x="1170" y="570" width="170" height="95" class="meta"/>
  <text x="1200" y="600" class="label">tag</text>
  <text x="1200" y="625" class="field">id PK</text>
  <text x="1200" y="645" class="field">title, slug</text>

  <line x1="155" y1="240" x2="155" y2="310" class="line"/>
  <line x1="250" y1="175" x2="720" y2="180" class="line"/>
  <line x1="250" y1="190" x2="720" y2="400" class="line"/>
  <line x1="250" y1="205" x2="1060" y2="400" class="line"/>
  <line x1="940" y1="415" x2="1060" y2="400" class="line"/>
  <line x1="580" y1="200" x2="720" y2="180" class="line"/>
  <line x1="580" y1="215" x2="720" y2="410" class="line"/>
  <line x1="470" y1="290" x2="455" y2="420" class="line"/>
  <line x1="490" y1="290" x2="455" y2="570" class="line"/>
  <line x1="520" y1="290" x2="745" y2="570" class="line"/>
  <line x1="545" y1="290" x2="995" y2="570" class="line"/>
  <line x1="940" y1="190" x2="1255" y2="570" class="line"/>
  <line x1="940" y1="430" x2="1255" y2="570" class="line"/>

  <text x="172" y="282" class="field">1:N</text>
  <text x="475" y="165" class="field">M:N</text>
  <text x="615" y="350" class="field">M:N</text>
  <text x="970" y="390" class="field">1:N</text>
  <text x="1210" y="525" class="field">M:N tags</text>
</svg>

