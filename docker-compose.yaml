services:
  # Mysql database container
  db:
    image: mysql
    container_name: db
    restart: always
    volumes:
      - db-data:/var/lib/mysql
    environment:
      MYSQL_DATABASE: grem
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    networks:
      - grem

  # phpmyadmin container
  phpmyadmin:
    image: phpmyadmin
    container_name: phpmyadmin
    restart: always
    depends_on:
      - db
    ports:
      - 8080:80
    environment:
      PMA_HOST: db
    networks:
      - grem

  # Symfony apache project container
  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    container_name: backend
    environment:
      APP_ENV: ${APP_ENV:-prod}
      APP_DEBUG: ${APP_DEBUG:-0}
      DATABASE_URL: "mysql://${MYSQL_USER}:${MYSQL_PASSWORD}@db:3306/grem?serverVersion=8.0"
      CORS_ALLOW_ORIGIN: ${CORS_ALLOW_ORIGIN:-^https?://localhost(:\\d+)?$}
      BACKEND_URL: ${BACKEND_URL:-http://localhost:8001}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
    depends_on:
      - db
    ports:
      - "8001:80"
    volumes:
      - ./docker/backend/vhosts:/etc/apache2/sites-enabled
      - ./backend:/var/www
      - ./docker/backend/entrypoint.sh:/entrypoint.sh
    restart: always
    networks:
      - grem
    command: [ "/bin/bash", "/entrypoint.sh" ]


  # React / Next.js frontend container
  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8001}
    container_name: frontend
    environment:
      API_URL_INTERNAL: "http://backend"
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8001}
    ports:
      - "3001:3001"
    networks:
      - grem
    depends_on:
      - backend
    restart: always

networks:
  grem:

volumes:
  db-data:
